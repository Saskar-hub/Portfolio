{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>{{ general_content.meta_title|default:"Full Stack Developer Portfolio | React & Django Expert" }}</title>
    <meta name="description" content="{{ general_content.meta_description|default:'Professional Full Stack Developer specializing in React and Django. Building scalable, SEO-optimized, and responsive web applications.' }}">
    <meta name="keywords" content="{{ general_content.meta_keywords|default:'Full Stack Developer, React Developer, Django Developer, Portfolio, Web Developer Nepal' }}">
    <meta name="author" content="Your Name">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{ general_content.meta_title|default:'Full Stack Developer Portfolio' }}">
    <meta property="og:description" content="{{ general_content.meta_description|default:'Modern web applications built with React and Django' }}">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'portfolio/css/index.css' %}">
</head>
<body class="bg-white dark:bg-gray-900">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                    Portfolio
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#home" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition-colors">Home</a>
                    <a href="#about" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition-colors">About</a>
                    <a href="#projects" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition-colors">Projects</a>
                    <a href="#skills" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition-colors">Skills</a>
                    <a href="#experience" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition-colors">Experience</a>
                    <a href="#contact" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition-colors">Contact</a>
                    {% if user.is_authenticated and user.is_superuser %}
                        <a href="{% url 'admin_dashboard' %}" class="px-4 py-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg font-medium">Admin</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    {% block content %}
    {% endblock %}
</body>
</html>
